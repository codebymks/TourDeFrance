<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tour de France</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>Riders</h1>

<!--read rider-->
<table id="riderTable" border="1">

    <thead>
    <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Age</th>
        <th>Total Time</th>
        <th>Sprint</th>
        <th>Mountain</th>
        <th>Country</th>
        <th>Team</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    </tbody>

</table>

<!--create rider-->
<h2>Add Rider</h2>

<form id="riderForm">
    <input id="firstName" placeholder="First Name" required>
    <input id="lastName" placeholder="Last Name" required>

    <input id="age" type="number" placeholder="Age" required>
    <input id="totalTime" type="number" placeholder="Total Time" required>
    <input id="sprintPoint" type="number" placeholder="Sprint Point" required>
    <input id="mountainPoint" type="number" placeholder="Mountain Point" required>
    <input id="teamPoint" type="number" placeholder="Team Point" required>
    <select id="country" required>
        <option value="">Select Country</option>
        <option value="FRANCE">France</option>
        <option value="DENMARK">Denmark</option>
        <option value="GERMANY">Germany</option>
        <option value="SPAIN">Spain</option>
    </select>
    <select id="teamSelect" required>
        <option value="">Select Team</option>
    </select>
    <button type="submit">Save Rider</button>
</form>

<!--update rider-->
<div id="updateRiderFormContainer" style="display:none">
    <h2>Update Rider</h2>
    <form id="updateRiderForm">
        <input type="hidden" id="updateRiderId">

        <input id="updateFirstName" placeholder="First Name" required>
        <input id="updateLastName" placeholder="Last Name" required>

        <input id="updateAge" type="number" placeholder="Age" required>
        <input id="updateTotalTime" type="number" placeholder="Total Time" required>

        <select id="updateCountry" required>
            <option value="">Select Country</option>
            <option value="FRANCE">France</option>
            <option value="DENMARK">Denmark</option>
            <option value="GERMANY">Germany</option>
            <option value="SPAIN">Spain</option>
        </select>

        <select id="updateTeamSelect" required></select>
        <input id="updateSprintPoint" type="number" placeholder="Sprint Point" required>
        <input id="updateMountainPoint" type="number" placeholder="Mountain Point" required>

        <button type="submit">Update Rider</button>
    </form>
</div>

<h1>Teams</h1>

<!--read team-->
<table id="teamsTable" border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Team Name</th>
        <th>Country</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<!--create team-->
<h2>Add Team</h2>
<form id="teamForm">
    <input id="teamNameInput" placeholder="Team Name" required>
    <select id="teamCountry" required>
        <option value="">Select Country</option>
        <option value="FRANCE">France</option>
        <option value="DENMARK">Denmark</option>
        <option value="GERMANY">Germany</option>
        <option value="SPAIN">Spain</option>
    </select>
    <button type="submit">Save Team</button>
</form>

<!--update team-->
<div id="updateTeamFormContainer" style="display:none">
    <h2>Update Team</h2>
    <form id="updateTeamForm">
        <input type="hidden" id="updateTeamId">

        <input id="updateTeamNameInput" placeholder="Team Name" required>

        <select id="updateTeamCountry" required>
            <option value="FRANCE">France</option>
            <option value="DENMARK">Denmark</option>
            <option value="GERMANY">Germany</option>
            <option value="SPAIN">Spain</option>
        </select>

        <button type="submit">Update Team</button>
    </form>
</div>

<script>const API_BASE_URL = "http://localhost:8080";</script>
<script src="/js/riders.js" defer></script>
<script src="/js/teams.js" defer></script>
</body>
</html>
